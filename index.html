<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<!-- ▼ 카카오톡 강제 외부 브라우저 전환 스크립트 시작 ▼ -->
<script>
  (function(){
    if (navigator.userAgent.toLowerCase().indexOf('kakaotalk') === -1) return;
    var kakaoUrl = 'kakaotalk://web/openExternal?url=' + encodeURIComponent(location.href);
    try {
      // If this page is embedded in an iframe (e.g. Claude's artifact viewer),
      // redirecting the iframe itself does nothing useful - we need the actual
      // top-level tab that KakaoTalk's browser is showing. This throws if the
      // parent frame is a different origin, which is why it's wrapped below.
      if (window.top && window.top !== window.self) {
        window.top.location.href = kakaoUrl;
      } else {
        location.href = kakaoUrl;
      }
    } catch(e) {
      // Cross-origin parent - can't reach it, so at least try this frame.
      try { location.href = kakaoUrl; } catch(e2) {}
    }
  })();
</script>
<!-- ▲ 스크립트 끝 ▲ -->
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#0B4023">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="FC 계약 받기">
<title>FC 계약 받아 소득 올리기 | DB손해보험 전략사업부문 광화문사업단</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Jua&family=Gowun+Dodum&display=swap" rel="stylesheet">
<style>
:root{
  /* DB손해보험 그린 아이덴티티 기반 - 밝고 화사한 팔레트 */
  --navy-deep:#0B4023;      /* 짙은 포레스트 그린 (베이스) */
  --navy-mid:#1D7A3C;       /* DB Green Gradient 진한 톤 근접 (R0 G149 B89) */
  --sky-dusk:#66C24C;       /* DB Green Gradient 밝은 톤 근접 (R141 G198 B63) - 화사한 포인트 */
  --amber:#F47920;          /* DB Red Gradient 밝은 톤 */
  --amber-deep:#C9252C;     /* DB Red Gradient 진한 톤 */
  --gold:#FFD166;
  --paper:#FBF7EE;
  --ink:#16233E;
  --danger:#E5484D;
  --warn:#F0B429;
  --info:#3B7DD8;
  --success:#00854A;        /* DB Green */
  --muted:#C4E0B8;
  --white:#FFFFFF;
  --radius-lg:26px;
  --radius-md:18px;
  --radius-sm:10px;
  --font-display:'Jua','Apple SD Gothic Neo',sans-serif;
  --font-body:'Gowun Dodum','Apple SD Gothic Neo','Malgun Gothic',sans-serif;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{margin:0;padding:0;overscroll-behavior:none;-webkit-user-select:none;user-select:none;-webkit-touch-callout:none;}
body{
  min-height:100dvh;
  background:radial-gradient(circle at 50% -10%, var(--sky-dusk) 0%, var(--navy-mid) 45%, var(--navy-deep) 100%);
  font-family:var(--font-body);
  color:var(--white);
  display:flex;
  justify-content:center;
  overflow-x:hidden;
}
#app{
  width:100%;
  max-width:480px;
  min-height:100dvh;
  position:relative;
  display:flex;
  flex-direction:column;
  box-shadow:0 0 70px rgba(0,0,0,0.55);
  background:transparent;
}
#skyline{
  position:absolute;
  left:0; right:0; bottom:0;
  height:180px;
  pointer-events:none;
  z-index:0;
  opacity:0.55;
}
.screen{
  display:none;
  flex-direction:column;
  flex:1;
  position:relative;
  z-index:1;
  padding:22px 20px calc(18px + env(safe-area-inset-bottom));
}
.screen.active{display:flex;}

/* ---------- Start Screen ---------- */
.brand-eyebrow{
  font-size:12px;
  letter-spacing:2px;
  color:var(--gold);
  text-align:center;
  opacity:0.9;
  margin-bottom:4px;
}
.title{
  font-family:var(--font-display);
  font-size:30px;
  line-height:1.35;
  text-align:center;
  color:var(--white);
  text-shadow:0 2px 0 rgba(0,0,0,0.35), 0 0 24px rgba(245,166,35,0.25);
  margin:0 0 4px;
}
.title em{
  font-style:normal;
  color:var(--gold);
}
.subtitle{
  text-align:center;
  color:var(--muted);
  font-size:13.5px;
  margin:0 0 18px;
}
.info-btn{
  position:absolute;
  top:22px; right:20px;
  width:32px; height:32px;
  border-radius:50%;
  background:rgba(255,255,255,0.08);
  border:1px solid rgba(255,255,255,0.18);
  color:var(--gold);
  font-family:var(--font-display);
  font-size:15px;
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;
  z-index:3;
}
.field-label{
  font-size:13px;
  color:var(--muted);
  margin:0 0 8px 4px;
}
.name-input{
  width:100%;
  padding:14px 18px;
  border-radius:999px;
  border:1.5px solid rgba(255,255,255,0.16);
  background:rgba(255,255,255,0.07);
  color:var(--white);
  font-family:var(--font-body);
  font-size:16px;
  outline:none;
  margin-bottom:20px;
}
.name-input::placeholder{color:rgba(255,255,255,0.35);}
.name-input:focus{border-color:var(--gold);background:rgba(255,255,255,0.11);}

.char-list{
  display:flex;
  flex-direction:column;
  gap:10px;
  margin-bottom:18px;
}
.char-card{
  display:flex;
  align-items:center;
  gap:12px;
  padding:10px 14px;
  border-radius:var(--radius-md);
  border:2px solid rgba(255,255,255,0.12);
  background:rgba(255,255,255,0.05);
  cursor:pointer;
  transition:border-color .15s, background .15s, transform .1s;
  animation:cardEnter .35s ease both;
}
.char-card:active{transform:scale(0.98);}
.char-card.selected{
  border-color:var(--gold);
  background:rgba(255,209,102,0.12);
  box-shadow:0 0 0 1px rgba(255,209,102,0.3) inset;
}
.char-badge{width:58px;height:58px;flex-shrink:0;border-radius:50%;overflow:hidden;background:rgba(255,255,255,0.06);}
.char-badge svg{width:100%;height:100%;display:block;}
.char-info{flex:1;min-width:0;}
.char-name{font-size:15px;font-weight:700;color:var(--white);margin:0 0 2px;}
.char-tagline{font-size:12px;color:var(--muted);margin:0;line-height:1.4;}
.char-check{
  width:22px;height:22px;border-radius:50%;
  border:2px solid rgba(255,255,255,0.25);
  flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
  font-size:12px;color:transparent;
}
.char-card.selected .char-check{
  background:var(--gold);border-color:var(--gold);color:var(--navy-deep);
}

.primary-btn{
  width:100%;
  padding:16px;
  border:none;
  border-radius:999px;
  background:linear-gradient(180deg,var(--amber),var(--amber-deep));
  color:var(--navy-deep);
  font-family:var(--font-display);
  font-size:18px;
  letter-spacing:1px;
  box-shadow:0 6px 0 rgba(150,90,10,0.55), 0 10px 20px rgba(245,166,35,0.25);
  cursor:pointer;
  transition:transform .08s, box-shadow .08s, opacity .15s;
}
.primary-btn:active{transform:translateY(4px);box-shadow:0 2px 0 rgba(150,90,10,0.55);}
.primary-btn:disabled{opacity:0.35;box-shadow:none;pointer-events:none;}

.ghost-btn{
  width:100%;
  margin-top:12px;
  padding:12px;
  border:1.5px solid rgba(255,255,255,0.18);
  border-radius:999px;
  background:transparent;
  color:var(--muted);
  font-family:var(--font-body);
  font-size:13.5px;
  cursor:pointer;
}
.ghost-btn:active{background:rgba(255,255,255,0.06);}

/* ---------- Countdown ---------- */
#screen-countdown{align-items:center;justify-content:center;}
.countdown-num{
  font-family:var(--font-display);
  font-size:110px;
  color:var(--gold);
  text-shadow:0 0 40px rgba(255,209,102,0.5);
  animation:countdownPulse .55s ease;
}
.countdown-sub{color:var(--muted);font-size:14px;margin-top:6px;}
.countdown-audio-tip{
  color:var(--muted);
  font-size:12px;
  line-height:1.5;
  margin-top:22px;
  padding:10px 20px;
  border-radius:12px;
  background:rgba(255,255,255,0.08);
  border:1px solid rgba(255,255,255,0.12);
  max-width:280px;
}

/* ---------- Game Screen ---------- */
#screen-game{padding:16px 14px calc(14px + env(safe-area-inset-bottom));}
.hud{
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:8px;
  margin-bottom:10px;
}
.hud-pill{
  display:flex;align-items:center;gap:6px;
  background:rgba(0,0,0,0.28);
  border:1px solid rgba(255,255,255,0.12);
  border-radius:999px;
  padding:8px 14px;
  font-family:var(--font-display);
  font-size:15px;
}
.hud-pill.timer{color:var(--white);}
.hud-pill.timer.urgent{color:var(--danger);animation:pulseGold 0.6s infinite;}
.hud-pill.score{color:var(--gold);}
.hud-pill.settings-btn{
  padding:8px 12px;
  border:1px solid rgba(255,255,255,0.12);
  background:rgba(0,0,0,0.28);
  color:var(--white);
  cursor:pointer;
  font-family:var(--font-body);
  font-size:16px;
  line-height:1;
}
.hud-pill.settings-btn:active{background:rgba(0,0,0,0.45);}
.hud-invincible{
  font-size:11px;color:var(--gold);
  font-family:var(--font-body);
  min-height:14px;
  text-align:center;
  margin-bottom:4px;
}
.hud-invincible.warn-text{
  color:var(--danger);
  font-weight:700;
}
.hud-fever{
  text-align:center;
  font-family:var(--font-display);
  font-size:15px;
  color:#3A2100;
  background:linear-gradient(90deg, #FFD166, #F47920, #FFD166);
  background-size:200% 100%;
  border-radius:999px;
  padding:6px 10px;
  margin-bottom:6px;
  box-shadow:0 3px 10px rgba(244,121,32,0.5);
  animation:feverGlow 0.7s ease-in-out infinite, feverSweep 1.4s linear infinite;
}
.pause-layer{
  position:absolute;inset:0;
  z-index:10;
  display:flex;align-items:center;justify-content:center;
  background:rgba(11,64,35,0.72);
  backdrop-filter:blur(2px);
}
.pause-card{
  width:86%;
  max-width:320px;
  background:var(--navy-mid);
  border:1px solid rgba(255,255,255,0.14);
  border-radius:var(--radius-lg);
  padding:22px 20px;
}
.volume-row{
  display:flex;align-items:center;gap:10px;
}
.mute-btn{
  width:34px;height:34px;flex-shrink:0;
  border-radius:50%;
  border:1px solid rgba(255,255,255,0.18);
  background:rgba(255,255,255,0.06);
  color:var(--white);
  font-size:15px;
  cursor:pointer;
}
.volume-row input[type="range"]{
  flex:1;
  -webkit-appearance:none;
  appearance:none;
  height:6px;
  border-radius:999px;
  background:rgba(255,255,255,0.18);
  outline:none;
}
.volume-row input[type="range"]::-webkit-slider-thumb{
  -webkit-appearance:none;
  width:18px;height:18px;border-radius:50%;
  background:var(--gold);
  cursor:pointer;
  border:2px solid rgba(11,64,35,0.6);
}
.volume-row input[type="range"]::-moz-range-thumb{
  width:18px;height:18px;border-radius:50%;
  background:var(--gold);
  cursor:pointer;
  border:2px solid rgba(11,64,35,0.6);
}
.game-area{
  position:relative;
  flex:1;
  min-height:380px;
  border-radius:var(--radius-lg);
  overflow:hidden;
  background:linear-gradient(180deg, rgba(102,194,76,0.35) 0%, rgba(29,122,60,0.75) 75%, rgba(11,64,35,0.92) 100%);
  border:1px solid rgba(255,255,255,0.08);
  touch-action:none;
  transition:background 0.6s ease, box-shadow 0.6s ease;
}
.game-area.fever{
  background:
    radial-gradient(ellipse 90% 65% at 50% 105%, rgba(255,244,180,0.85) 0%, rgba(255,176,50,0.72) 25%, rgba(232,90,20,0.62) 50%, rgba(120,20,8,0.78) 75%, rgba(40,8,4,0.92) 100%);
  box-shadow:0 0 0 3px rgba(255,180,60,0.75) inset, 0 0 34px rgba(255,90,20,0.65);
}
.game-area.fever::before{
  content:"";
  position:absolute;inset:0;
  background:radial-gradient(ellipse 90% 65% at 50% 105%, rgba(255,244,180,0.55) 0%, rgba(255,150,40,0.4) 35%, transparent 70%);
  pointer-events:none;
  will-change:opacity;
  animation:fireFlicker 0.6s ease-in-out infinite;
}
.flame-particle{
  position:absolute;
  bottom:0;
  font-size:18px;
  line-height:1;
  pointer-events:none;
  z-index:3;
  will-change:transform,opacity;
  animation:flameRise 1.1s ease-out forwards;
}
.game-area::after{
  content:"";
  position:absolute;inset:0;
  background-image:
    radial-gradient(70px 22px at 18% 5%, rgba(255,255,255,0.14), transparent 70%),
    radial-gradient(70px 22px at 52% 4%, rgba(255,255,255,0.12), transparent 70%),
    radial-gradient(70px 22px at 84% 6%, rgba(255,255,255,0.12), transparent 70%);
  pointer-events:none;
}
.flash-overlay{
  position:absolute;inset:0;z-index:5;pointer-events:none;
  opacity:0;
}
.flash-overlay.danger{animation:flashDanger .35s ease;}
.flash-overlay.gold{animation:flashGold .45s ease;}

.falling-item{
  position:absolute;
  width:72px;
  min-height:81px;
  border-radius:8px 8px 8px 2px;
  background:var(--paper);
  color:var(--ink);
  font-size:10px;
  line-height:1.25;
  font-weight:800;
  text-align:center;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  padding:6px 4px 22px;
  box-shadow:0 4px 10px rgba(0,0,0,0.35);
  will-change:transform;
}
.falling-item .fi-icon{
  width:29px;height:29px;
  margin-bottom:3px;
  flex-shrink:0;
}
.falling-item .fi-icon svg{width:100%;height:100%;display:block;}
.falling-item .fi-label{
  margin-bottom:2px;
}
.falling-item::before{
  content:"";
  position:absolute;
  top:0;right:0;
  width:0;height:0;
  border-style:solid;
  border-width:0 12px 12px 0;
  border-color:transparent rgba(0,0,0,0.14) transparent transparent;
}
.falling-item.complaint-paper{
  background:#F6D2CE;
  color:#7A1F1F;
}
.falling-item.complaint-paper::before{
  border-color:transparent rgba(122,31,31,0.22) transparent transparent;
}
.falling-wrap{
  position:absolute;
}
.paper-back{
  position:absolute;
  top:4px; left:-4px;
  width:48px; height:54px;
  background:#FFF3C4;
  border:1px solid rgba(0,0,0,0.18);
  border-radius:8px 8px 8px 2px;
  transform:rotate(11deg);
  box-shadow:0 2px 5px rgba(0,0,0,0.2);
}
.falling-item.paper-stack{
  position:absolute;
  top:0; left:0;
  transform:rotate(-4deg);
  width:62px;
  min-height:70px;
  background:#FFF9DC;
  font-size:9px;
  padding:5px 3px 19px;
}
.falling-item.paper-stack .fi-icon{
  width:25px;height:25px;
}
.falling-item .pt-badge{
  position:absolute;
  bottom:4px;left:50%;
  transform:translateX(-50%);
  font-family:var(--font-display);
  font-size:12px;
  padding:1px 8px;
  border-radius:999px;
  color:var(--white);
}
.falling-item.pos .pt-badge{background:var(--success);}
.falling-item.neg .pt-badge{background:var(--danger);}
.falling-item.stripe-red,
.falling-item.stripe-yellow,
.falling-item.stripe-blue{
  width:66px;
  min-height:78px;
  padding-left:13px;
  font-size:9.5px;
  box-shadow:0 4px 10px rgba(0,0,0,0.4);
  background-repeat:repeat-y, no-repeat;
  background-size:9px 11px, 100% 100%;
  background-position:0px 5px, 0 0;
}
.falling-item.stripe-red .fi-icon,
.falling-item.stripe-yellow .fi-icon,
.falling-item.stripe-blue .fi-icon{
  width:27px;height:27px;
}
.falling-item.stripe-red{background-image:radial-gradient(circle 2.3px, #FFFFFF 2.3px, transparent 2.4px), linear-gradient(155deg, #EB5B60, #C9252C); color:#FFFFFF;}
.falling-item.stripe-yellow{background-image:radial-gradient(circle 2.3px, #FFFFFF 2.3px, transparent 2.4px), linear-gradient(155deg, #FFD666, #E8A317); color:#4A3300;}
.falling-item.stripe-blue{background-image:radial-gradient(circle 2.3px, #FFFFFF 2.3px, transparent 2.4px), linear-gradient(155deg, #5CADEE, #1D6FB8); color:#FFFFFF;}
.falling-item.stripe-red .pt-badge,
.falling-item.stripe-yellow .pt-badge,
.falling-item.stripe-blue .pt-badge{
  background:rgba(0,0,0,0.32);
  border:1.5px solid rgba(255,255,255,0.65);
  font-size:10.5px;
}

.falling-item.invincible-item{
  width:84px;height:98px;
  clip-path:polygon(50% 0%, 100% 10%, 100% 48%, 82% 80%, 50% 100%, 18% 80%, 0% 48%, 0% 10%);
  border-radius:0;
  background:radial-gradient(circle at 50% 28%, #E4F7C8, #6DBF46 55%, #1D7A3C 100%);
  color:#FFFFFF;
  padding:12px 6px 8px;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  box-shadow:0 0 0 3px #FFD166 inset, 0 0 0 6px rgba(255,255,255,0.5) inset, 0 0 0 1px rgba(139,90,10,0.55), 0 6px 16px rgba(0,0,0,0.45);
  animation:shieldPulse 0.9s ease-in-out infinite;
  position:relative;
}
.falling-item.invincible-item .ii-label{
  text-shadow:0 1px 3px rgba(11,64,35,0.6);
}
.falling-item.invincible-item::before{
  content:"✦";
  position:absolute;
  bottom:5px; left:4px;
  width:auto;height:auto;
  border:none;
  font-size:11px;
  color:#FFFFFF;
  text-shadow:0 0 4px rgba(255,255,255,0.9);
  animation:sparkleTwinkle 0.8s ease-in-out infinite 0.4s;
}
.falling-item.invincible-item::after{
  content:"✦";
  position:absolute;
  top:1px; right:3px;
  font-size:15px;
  color:#FFFFFF;
  text-shadow:0 0 4px rgba(255,255,255,0.9);
  animation:sparkleTwinkle 0.8s ease-in-out infinite;
}
.invincible-item .ii-inner{
  width:38px;height:38px;
  margin-bottom:2px;
  flex-shrink:0;
}
.invincible-item .ii-inner svg{width:100%;height:100%;display:block;filter:drop-shadow(0 2px 4px rgba(0,0,0,0.35));}
.invincible-item .ii-label{
  font-family:var(--font-display);
  font-size:12px;
  line-height:1.2;
}

.score-pop{
  position:absolute;
  font-family:var(--font-display);
  font-size:19px;
  font-weight:700;
  pointer-events:none;
  z-index:6;
  animation:floatUp .8s ease forwards;
  text-shadow:0 2px 4px rgba(0,0,0,0.5);
}
.score-pop.pos{color:var(--success);}
.score-pop.neg{color:var(--danger);}
.score-pop.shield{color:var(--gold);}

.basket-wrap{
  position:absolute;
  bottom:4px;
  width:84px;
  display:flex;
  flex-direction:column;
  align-items:center;
  z-index:4;
  transform:translateX(-50%);
}
.basket-char{
  width:82px;height:107px;
  position:relative;
}
.basket-char svg{width:100%;height:100%;display:block;}
.basket-char.invincible svg{
  filter:drop-shadow(0 0 8px var(--gold)) drop-shadow(0 0 3px var(--gold));
  animation:basketGlow .5s infinite;
}
.basket-char.stunned svg{
  filter:grayscale(0.65) brightness(0.88);
  animation:stunnedShake 0.28s ease-in-out infinite;
}
.control-hint{
  text-align:center;
  color:var(--muted);
  font-size:11.5px;
  margin-top:6px;
  min-height:14px;
}

/* ---------- Result Screen ---------- */
.result-hero{
  text-align:center;
  margin-bottom:14px;
}
.result-tier{
  font-size:13px;color:var(--gold);margin-bottom:2px;
}
.result-score-label{font-size:12px;color:var(--muted);margin-bottom:2px;}
.result-score{
  font-family:var(--font-display);
  font-size:52px;
  color:var(--white);
  text-shadow:0 0 30px rgba(255,209,102,0.35);
}

<script>
(function(){
"use strict";

/* ========================================================
   CONFIG
======================================================== */
var GAME_DURATION = 60; // seconds

/* ========================================================
   REAL-TIME SHARED LEADERBOARD (optional - Firebase Realtime DB)
   GitHub Pages is static hosting with no backend of its own, so a truly
   live cross-device leaderboard needs an external real-time data store.
   Firebase's free tier is built for exactly this.

   To turn this on: create a free project at https://console.firebase.google.com
   -> Build > Realtime Database > Create Database (test mode is fine for an
   internal team game) -> Project settings > General > "Your apps" > copy
   the config values below. Takes about 5 minutes. Until you fill these in,
   the game works exactly as before and the live-leaderboard button stays
   hidden - nothing breaks.
======================================================== */
var FIREBASE_CONFIG = {
  apiKey: "AIzaSyAtFqx-iH75__jO_08Xeo7NLkhNUSqOJ6o",
  databaseURL: "https://dbins-winners-game-default-rtdb.firebaseio.com",
  projectId: "dbins-winners-game"
};
var fbEnabled = false;
var fbDb = null;
var fbListenerRef = null;

function initFirebase(){
  if(FIREBASE_CONFIG.apiKey === "YOUR_API_KEY") return; // not configured yet
  if(typeof firebase === 'undefined') return; // CDN script didn't load (offline etc.)
  try{
    firebase.initializeApp(FIREBASE_CONFIG);
    fbDb = firebase.database();
    fbEnabled = true;
    var btn = document.getElementById('btn-live-rank');
    if(btn) btn.classList.remove('hidden');
  }catch(e){ fbEnabled = false; }
}
initFirebase();

function sanitizeKeyForFirebase(name){
  return (name||'player').replace(/[.#$\[\]\/]/g, '_').slice(0,60);
}

function submitScoreOnline(){
  if(!fbEnabled) return;
  try{
    var key = sanitizeKeyForFirebase(state.name);
    var ref = fbDb.ref('scores/'+key);
    ref.once('value').then(function(snap){
      var existing = snap.val();
      if(!existing || state.score > existing.score){
        ref.set({
          name: state.name,
          character: state.character,
          score: state.score,
          updatedAt: Date.now()
        });
      }
    }).catch(function(){});
  }catch(e){}
}

function renderLiveLeaderboard(recordsObj){
  var body = document.getElementById('live-lb-body');
  if(!body) return;
  var records = [];
  if(recordsObj){
    Object.keys(recordsObj).forEach(function(k){
      var r = recordsObj[k];
      if(r && typeof r.score === 'number') records.push(r);
    });
  }
  records.sort(function(a,b){
    if(b.score !== a.score) return b.score - a.score;
    return (a.updatedAt||0) - (b.updatedAt||0);
  });
  body.innerHTML = '';
  if(records.length === 0){
    body.innerHTML = '<div class="lb-empty">아직 등록된 기록이 없습니다.<br>가장 먼저 도전해보세요!</div>';
    return;
  }
  records.forEach(function(r, idx){
    var rank = idx+1;
    var isMe = r.name === state.name;
    var c = CHARACTERS.filter(function(x){return x.id===r.character;})[0] || CHARACTERS[0];
    var row = document.createElement('div');
    row.className = 'lb-row'+(isMe?' me':'')+(rank<=3?' rank-'+rank:'');
    row.innerHTML =
      '<div class="lb-rank">'+rank+'</div>' +
      '<div class="lb-name">'+escapeHtml(r.name)+' <span class="lb-char">('+c.name+')</span></div>' +
      '<div class="lb-score">'+r.score+'점</div>';
    body.appendChild(row);
  });
}

function openLiveLeaderboard(){
  var modal = document.getElementById('live-modal');
  modal.classList.add('open');
  var body = document.getElementById('live-lb-body');
  body.innerHTML = '<div class="lb-loading">불러오는 중...</div>';
  if(!fbEnabled || !fbDb) return;
  try{
    fbListenerRef = fbDb.ref('scores');
    fbListenerRef.on('value', function(snap){
      renderLiveLeaderboard(snap.val());
    }, function(){
      body.innerHTML = '<div class="lb-empty">순위를 불러오지 못했습니다.</div>';
    });
  }catch(e){
    body.innerHTML = '<div class="lb-empty">순위를 불러오지 못했습니다.</div>';
  }
}
function closeLiveLeaderboard(){
  document.getElementById('live-modal').classList.remove('open');
  if(fbListenerRef){
    try{ fbListenerRef.off('value'); }catch(e){}
    fbListenerRef = null;
  }
}

var ITEM_TYPES = [
  { id:'child',        label:['자녀보험','청약서'], score:200,  weight:3,  speed:250, cls:'pos' },
  { id:'comprehensive', label:['종합보험','청약서'], score:150,  weight:5,  speed:225, cls:'pos' },
  { id:'simple',        label:['간편보험','청약서'], score:100,  weight:9,  speed:205, cls:'pos' },
  { id:'meritz',  label:['메리츠화재','청약서'], score:-100, weight:4,  speed:215, cls:'neg', stripe:'stripe-red' },
  { id:'kb',      label:['KB손보','청약서'],     score:-100, weight:4,  speed:215, cls:'neg', stripe:'stripe-yellow' },
  { id:'samsung', label:['삼성화재','청약서'],   score:-100, weight:4,  speed:215, cls:'neg', stripe:'stripe-blue' },
  { id:'property', label:['재물보험','청약서'], score:50,  weight:11, speed:185, cls:'pos' },
  { id:'complaint', label:['고객 민원','서류'], score:-50, weight:9,  speed:185, cls:'neg' },
  { id:'pet',     label:['펫보험','청약서'],     score:-10, weight:14, speed:165, cls:'neg' },
  { id:'driver',  label:['운전자보험','청약서'], score:25,  weight:16, speed:150, cls:'pos' },
  { id:'reg',     label:['고객 등록','서류'],     score:10,  weight:20, speed:130, cls:'pos' }
];
var ITEM_TOTAL_WEIGHT = ITEM_TYPES.reduce(function(s,i){return s+i.weight;},0);

/* ========================================================
   ITEM ICONS - small pictograms so falling items are easy to
   tell apart at a glance (child / adult / elderly / house / car /
   plain / pet / complaint / competitor monograms)

/* Simple round "sticker" eye: white ellipse + bold outline + big iris - matches
   the cute-illustration reference (clear white, big dark iris, crisp outline,
   plus an outer lash flick for a more natural expressive look) */
function eyeSVG(cx, cy, outerSide){
  var rx = 8, ry = 9.5;
  var flick = '<path d="M'+(cx+outerSide*rx*0.85)+','+(cy-3)+
    ' Q'+(cx+outerSide*(rx+5))+','+(cy-6.5)+' '+(cx+outerSide*(rx+7))+','+(cy-9.5)+'"' +
    ' stroke="'+OUTLINE+'" stroke-width="2.1" fill="none" stroke-linecap="round"/>';
  return '<ellipse cx="'+cx+'" cy="'+cy+'" rx="'+rx+'" ry="'+ry+'" fill="#FFFFFF" stroke="'+OUTLINE+'" stroke-width="2.2"/>' +
    '<circle cx="'+cx+'" cy="'+(cy+1.8)+'" r="6.6" fill="#3A2718"/>' +
    '<circle cx="'+cx+'" cy="'+(cy+1.8)+'" r="4" fill="#000000"/>' +
    '<circle cx="'+(cx-2.6)+'" cy="'+(cy-2)+'" r="2.3" fill="#FFFFFF"/>' +
    '<circle cx="'+(cx+2.8)+'" cy="'+(cy+3.6)+'" r="1.1" fill="#FFFFFF" opacity="0.9"/>' +
    flick;
}

/* ========================================================
   AUDIO ENGINE (procedural WebAudio - no external files needed)
======================================================== */
var audioCtx = null;
var bgmGain = null;
var sfxGain = null;
var bgmTimerId = null;
var bgmStep = 0;
var audioSettings = { bgmVolume:0.35, sfxVolume:0.6, bgmMuted:false, sfxMuted:false };
var BGM_PATTERN = [261.63,329.63,392.00,329.63,293.66,349.23,440.00,349.23];
var FEVER_BGM_PATTERN = [392.00,493.88,587.33,493.88,440.00,523.25,659.25,523.25,587.33,698.46,783.99,698.46];

function initAudio(){
  if(audioCtx) return;
  try{
    var Ctx = window.AudioContext || window.webkitAudioContext;
    if(!Ctx) return;
    audioCtx = new Ctx();
    bgmGain = audioCtx.createGain();
    bgmGain.gain.value = audioSettings.bgmMuted ? 0 : audioSettings.bgmVolume;
    bgmGain.connect(audioCtx.destination);
    sfxGain = audioCtx.createGain();
    sfxGain.gain.value = audioSettings.sfxMuted ? 0 : audioSettings.sfxVolume;
    sfxGain.connect(audioCtx.destination);
  }catch(e){ audioCtx = null; }
}
function unlockAudioForMobile(){
  // iOS Safari (and many in-app webviews, incl. KakaoTalk's) only allow audio
  // after a real user gesture, and calling resume() alone is sometimes not
  // enough - actually starting a silent buffer inside the gesture handler is
  // the most reliable known "unlock" trick.
  if(!audioCtx) return;
  try{
    if(audioCtx.state === 'suspended'){ audioCtx.resume().catch(function(){}); }
    var buffer = audioCtx.createBuffer(1, 1, 22050);
    var src = audioCtx.createBufferSource();
    src.buffer = buffer;
    src.connect(audioCtx.destination);
    if(src.start) src.start(0); else if(src.noteOn) src.noteOn(0);
  }catch(e){}
}
function resumeAudioCtx(){
  initAudio();
  unlockAudioForMobile();
}
function playTone(freq, duration, type, gainNode, startTime, peakGain){
  if(!audioCtx || !gainNode) return;
  try{
    var osc = audioCtx.createOscillator();
    var g = audioCtx.createGain();
    osc.type = type || 'sine';
    osc.frequency.value = freq;
    var t0 = startTime || audioCtx.currentTime;
    g.gain.setValueAtTime(0.0001, t0);
    g.gain.linearRampToValueAtTime(peakGain!=null?peakGain:1, t0+0.012);
    g.gain.exponentialRampToValueAtTime(0.0001, t0+duration);
    osc.connect(g);
    g.connect(gainNode);
    osc.start(t0);
    osc.stop(t0+duration+0.02);
  }catch(e){}
}
function sfxClick(){ resumeAudioCtx(); if(audioCtx) playTone(520,0.05,'sine',sfxGain,audioCtx.currentTime,0.22); }
function sfxCatchPositive(){
  if(!audioCtx) return;
  playTone(880,0.11,'triangle',sfxGain,audioCtx.currentTime,0.45);
  playTone(1320,0.12,'triangle',sfxGain,audioCtx.currentTime+0.05,0.32);
}
function sfxCatchNegative(){
  if(!audioCtx) return;
  playTone(220,0.18,'sawtooth',sfxGain,audioCtx.currentTime,0.32);
}
function sfxStun(){
  if(!audioCtx) return;
  [180,150,120].forEach(function(f,i){
    playTone(f,0.22,'sawtooth',sfxGain,audioCtx.currentTime+i*0.1,0.3);
  });
}
function sfxShield(){
  if(!audioCtx) return;
  [660,880,1100,1320].forEach(function(f,i){
    playTone(f,0.1,'square',sfxGain,audioCtx.currentTime+i*0.05,0.25);
  });
}
function sfxFever(){
  if(!audioCtx) return;
  [523,659,784,1047,1319].forEach(function(f,i){
    playTone(f,0.16,'triangle',sfxGain,audioCtx.currentTime+i*0.06,0.35);
  });
}
function scheduleBgmStep(){
  if(!audioCtx || !state.bgmActive) return;
  var fever = state.feverActive;
  var pattern = fever ? FEVER_BGM_PATTERN : BGM_PATTERN;
  var freq = pattern[bgmStep % pattern.length];
  if(fever){
    playTone(freq,0.26,'triangle',bgmGain,audioCtx.currentTime,0.26);
  } else {
    playTone(freq,0.5,'sine',bgmGain,audioCtx.currentTime,0.2);
  }
  bgmStep++;
  bgmTimerId = setTimeout(scheduleBgmStep, fever ? 190 : 380);
}
function startBgm(){
  if(!audioCtx) return;
  if(state.bgmActive) return;
  state.bgmActive = true;
  scheduleBgmStep();
}
function stopBgm(){
  state.bgmActive = false;
  if(bgmTimerId){ clearTimeout(bgmTimerId); bgmTimerId = null; }
}
function applyAudioSettings(){
  if(bgmGain) bgmGain.gain.value = audioSettings.bgmMuted ? 0 : audioSettings.bgmVolume;
  if(sfxGain) sfxGain.gain.value = audioSettings.sfxMuted ? 0 : audioSettings.sfxVolume;
}
// Unlock audio on the first user interaction, listening for several gesture
// types at once (mobile browsers vary in which one they honor) and keep
// re-attempting on every tap until the context is confirmed running - some
// in-app webviews (KakaoTalk, etc.) need more than one try.
function primeAudioOnce(){
  resumeAudioCtx();
  if(audioCtx && audioCtx.state === 'running'){
    GESTURE_EVENTS.forEach(function(ev){ document.removeEventListener(ev, primeAudioOnce, true); });
  }
}
var GESTURE_EVENTS = ['touchstart','touchend','pointerdown','mousedown','click','keydown'];
GESTURE_EVENTS.forEach(function(ev){ document.addEventListener(ev, primeAudioOnce, true); });
document.addEventListener('visibilitychange', function(){
  if(document.visibilityState === 'visible') resumeAudioCtx();
});

  var rect = gameArea.getBoundingClientRect();

}

   START GAME
======================================================== */
function startGame(){
  state.score = 0;
  state.timeLeft = GAME_DURATION;
  state.elapsed = 0;
  state.items = [];
  state.invincibleUntil = 0;
  state.spawnAcc = 0;
  state.nextSpawnIn = 500;
  state.lastTs = 0;
  state.pointerActive = false;
  state.paused = false;
  state.keys = {left:false,right:false};
  state.lastNegativeCatchAt = 0;
  state.caughtPositiveSinceNegative = false;
  state.feverActive = false;
  state.feverUntil = 0;
  state.lastFlameParticleAt = 0;
  state.stunnedUntil = 0;

  if(expressionTimeoutId){ clearTimeout(expressionTimeoutId); expressionTimeoutId = null; }
  currentExpression = 'neutral';
  hudFever.classList.add('hidden');
  gameArea.classList.remove('fever');

  document.querySelectorAll('.falling-item, .falling-wrap').forEach(function(el){ el.remove(); });
  pauseLayer.classList.add('hidden');

  // IMPORTANT: show the game screen FIRST, then measure.
  // getBoundingClientRect() on a display:none element returns all zeros,
  // which previously froze the basket and made items get "caught" before
  // ever becoming visible. Showing the screen forces layout, so the
  // measurement below is accurate.
  showScreen('game');

  var rect = gameArea.getBoundingClientRect();
  state.areaW = rect.width;
  state.areaH = rect.height;
  state.basketX = state.areaW/2;
  state.basketTargetX = state.areaW/2;

  if(state.areaW < 10 || state.areaH < 10){
    // extremely defensive fallback for odd rendering timing
    requestAnimationFrame(function(){
      var r2 = gameArea.getBoundingClientRect();
      if(r2.width>10) state.areaW = r2.width;
      if(r2.height>10) state.areaH = r2.height;
      state.basketX = state.areaW/2;
      state.basketTargetX = state.areaW/2;
    });
  }

  basketCharEl.innerHTML = charBodySVG(state.character);

  // schedule invincible spawns: 3 or 4 across the round
  var count = Math.random()<0.5 ? 3 : 4;
  var seg = GAME_DURATION / count;
  var queue = [];
  for(var i=0;i<count;i++){
    var t = i*seg + 2 + Math.random()*Math.max(seg-4, 1);
    queue.push(t);
  }
  state.invincibleQueue = queue;

  hudScore.textContent = '0점';
  hudTimer.textContent = '⏱ '+GAME_DURATION;
  hudTimer.classList.remove('urgent');
  hudInvincible.innerHTML = '&nbsp;';
  controlHint.textContent = '화면을 좌우로 드래그하거나 방향키로 이동하세요';
  controlHint.style.opacity = '1';

  state.running = true;
  initAudio();
  resumeAudioCtx();
  startBgm();
  requestAnimationFrame(gameLoop);
}

/* ========================================================
   SPAWN LOGIC
======================================================== */
function pickWeightedItem(){
  var r = Math.random()*ITEM_TOTAL_WEIGHT;
  for(var i=0;i<ITEM_TYPES.length;i++){
    if(r < ITEM_TYPES[i].weight) return ITEM_TYPES[i];
    r -= ITEM_TYPES[i].weight;
  }
  return ITEM_TYPES[ITEM_TYPES.length-1];
}

function speedMultiplier(){
  var progress = state.elapsed / GAME_DURATION;
  return 1 + 0.6*Math.min(progress,1);
}
function intervalMultiplier(){
  var progress = state.elapsed / GAME_DURATION;
  return 1 - 0.45*Math.min(progress,1);
}

function spawnRegularItem(){
  var def = pickWeightedItem();
  var isCompetitor = !!def.stripe;
  var isRegPaper = def.id==='reg';
  var w = isCompetitor ? 66 : (isRegPaper ? 62 : 72);
  var h = isCompetitor ? 78 : (isRegPaper ? 70 : 81);
  var x = Math.random()*(state.areaW - w);

  var el = document.createElement('div');
  var extraCls = def.cls+(def.stripe ? ' '+def.stripe : '')+(def.id==='complaint' ? ' complaint-paper' : '')+(isRegPaper ? ' paper-stack' : '');
  el.className = 'falling-item '+extraCls;
  var icon = ICON_SVGS[def.id] ? '<div class="fi-icon">'+ICON_SVGS[def.id]+'</div>' : '';
  el.innerHTML = icon +
    def.label.map(function(l){return '<div class="fi-label">'+l+'</div>';}).join('') +
    '<div class="pt-badge">'+(def.score>0?'+':'')+def.score+'</div>';

  var mover; // the element whose position actually gets animated as it falls

  if(isRegPaper){
    // wrapper holds a "back sheet" DOM sibling that's appended BEFORE the
    // main card, so it's guaranteed to paint underneath it (no z-index
    // trick can make a pseudo-element render behind its own element's
    // background - it has to be an earlier sibling instead)
    var wrap = document.createElement('div');
    wrap.className = 'falling-wrap';
    wrap.style.left = x+'px';
    wrap.style.top = (-h)+'px';
    var back = document.createElement('div');
    back.className = 'paper-back';
    wrap.appendChild(back);
    wrap.appendChild(el);
    gameArea.appendChild(wrap);
    mover = wrap;
  } else {
    el.style.left = x+'px';
    el.style.top = (-h)+'px';
    gameArea.appendChild(el);
    mover = el;
  }

  state.items.push({ el:mover, x:x, y:-h, w:w, h:h, speed:def.speed, score:def.score, kind:'item', id:def.id });
}

function spawnInvincibleItem(){
  var w = 84;
  var x = Math.random()*(state.areaW - w);
  var el = document.createElement('div');
  el.className = 'falling-item invincible-item';
  el.innerHTML = '<div class="ii-inner">'+ICON_SVGS.shield+'</div>' +
    '<div class="ii-label">지점장</div><div class="ii-label">방패</div>';
  el.style.left = x+'px';
  el.style.top = '-98px';
  gameArea.appendChild(el);
  state.items.push({ el:el, x:x, y:-98, w:w, h:98, speed:190, score:0, kind:'shield' });
}

/* ========================================================
   MAIN LOOP
======================================================== */
function gameLoop(ts){
  if(!state.running) return;
  if(state.paused) return;
  if(!state.lastTs) state.lastTs = ts;
  var dt = Math.min((ts - state.lastTs)/1000, 0.05);
  state.lastTs = ts;
  state.elapsed += dt;

  // timer
  var newTimeLeft = Math.max(0, GAME_DURATION - state.elapsed);
  var displaySec = Math.ceil(newTimeLeft);
  if(displaySec !== state.timeLeft){
    state.timeLeft = displaySec;
    hudTimer.textContent = '⏱ '+state.timeLeft;
    if(state.timeLeft<=10) hudTimer.classList.add('urgent'); else hudTimer.classList.remove('urgent');
  }
  if(newTimeLeft<=0){
    endGame();
    return;
  }

  // invincible scheduled spawns
  while(state.invincibleQueue.length && state.elapsed >= state.invincibleQueue[0]){
    state.invincibleQueue.shift();
    spawnInvincibleItem();
  }

  // regular spawn timing
  state.spawnAcc += dt*1000;
  if(state.spawnAcc >= state.nextSpawnIn){
    state.spawnAcc = 0;
    var base = 650 + Math.random()*300;
    state.nextSpawnIn = Math.max(220, base*intervalMultiplier());
    spawnRegularItem();
  }

  // basket movement
  var speedMul = speedMultiplier();
  var stunnedNow = Date.now() < state.stunnedUntil;
  if(!stunnedNow){
    if(state.pointerActive){
      state.basketX += (state.basketTargetX - state.basketX) * Math.min(dt*12, 1);
    }
    var KEY_SPEED = 420;
    if(state.keys.left) state.basketX -= KEY_SPEED*dt;
    if(state.keys.right) state.basketX += KEY_SPEED*dt;
  }
  var half = 42;
  state.basketX = Math.max(half, Math.min(state.areaW-half, state.basketX));
  basketWrap.style.left = state.basketX+'px';

  var invincibleNow = Date.now() < state.invincibleUntil;
  basketCharEl.classList.toggle('invincible', invincibleNow);
  basketCharEl.classList.toggle('stunned', stunnedNow);
  if(invincibleNow){
    var remain = Math.max(0, (state.invincibleUntil - Date.now())/1000);
    hudInvincible.textContent = '🛡 무적 '+remain.toFixed(1)+'초';
    hudInvincible.classList.remove('warn-text');
  } else if(stunnedNow){
    var remainStun = Math.max(0, (state.stunnedUntil - Date.now())/1000);
    hudInvincible.textContent = '😵 '+remainStun.toFixed(1)+'초간 이동 불가!';
    hudInvincible.classList.add('warn-text');
  } else {
    hudInvincible.innerHTML = '&nbsp;';
    hudInvincible.classList.remove('warn-text');
  }

  // FEVER TIME: 15 clean seconds (no negative catches) with at least one
  // positive/shield catch in that window triggers 8s of double positive score
  if(!state.feverActive && state.caughtPositiveSinceNegative && (state.elapsed - state.lastNegativeCatchAt >= 15)){
    activateFever();
  }
  if(state.feverActive){
    if(state.elapsed >= state.feverUntil){
      state.feverActive = false;
      hudFever.classList.add('hidden');
      gameArea.classList.remove('fever');
    } else {
      hudFever.classList.remove('hidden');
      gameArea.classList.add('fever');
      if(state.elapsed - state.lastFlameParticleAt > 0.35){
        state.lastFlameParticleAt = state.elapsed;
        spawnFlameParticle();
      }
    }
  }

  // basket collision box (aligned with the bag held in front of the character)
  var basketRect = {
    left: state.basketX - 28,
    right: state.basketX + 28,
    top: state.areaH - 50,
    bottom: state.areaH - 16
  };

  for(var i=state.items.length-1; i>=0; i--){
    var it = state.items[i];
    it.y += it.speed*speedMul*dt;
    it.el.style.top = it.y+'px';

    var itLeft = it.x, itRight = it.x+it.w, itTop = it.y, itBottom = it.y+it.h;
    var overlap = itRight>basketRect.left && itLeft<basketRect.right && itBottom>basketRect.top && itTop<basketRect.bottom;

    if(overlap){
      catchItem(it, invincibleNow);
      state.items.splice(i,1);
      continue;
    }
    if(it.y > state.areaH+10){
      it.el.remove();
      state.items.splice(i,1);
    }
  }

  requestAnimationFrame(gameLoop);
}

/* ========================================================
   CATCH HANDLING
======================================================== */
function spawnScorePop(text, cls, x, y){
  var pop = document.createElement('div');
  pop.className = 'score-pop '+cls;
  pop.textContent = text;
  pop.style.left = x+'px';
  pop.style.top = y+'px';
  gameArea.appendChild(pop);
  setTimeout(function(){ pop.remove(); }, 820);
}

function spawnFlameParticle(){
  var p = document.createElement('div');
  p.className = 'flame-particle';
  p.textContent = Math.random()<0.5 ? '🔥' : '✨';
  p.style.left = (8 + Math.random()*(state.areaW-16))+'px';
  gameArea.appendChild(p);
  setTimeout(function(){ p.remove(); }, 1150);
}

function activateFever(){
  state.feverActive = true;
  state.feverUntil = state.elapsed + 8;
  // restart the clean-streak requirement so the next fever needs a fresh 15s
  state.lastNegativeCatchAt = state.elapsed;
  state.caughtPositiveSinceNegative = false;
  sfxFever();
  hudFever.classList.remove('hidden');
}

function catchItem(it, invincibleNow){
  it.el.remove();
  var popX = it.x + it.w/2;
  var popY = state.areaH - 70;

  if(it.kind==='shield'){
    state.invincibleUntil = Date.now() + 5000;
    state.caughtPositiveSinceNegative = true;
    spawnScorePop('방패 획득!', 'shield', popX, popY);
    flashOverlay.classList.remove('gold');
    void flashOverlay.offsetWidth;
    flashOverlay.classList.add('gold');
    sfxShield();
    setExpression('happy');
    return;
  }

  var applied = it.score;
  if(invincibleNow && it.score<0){
    spawnScorePop('방어!', 'shield', popX, popY);
    applied = 0;
    sfxCatchPositive();
    setExpression('happy');
  } else if(it.score<0){
    spawnScorePop(''+it.score, 'neg', popX, popY);
    flashOverlay.classList.remove('danger');
    void flashOverlay.offsetWidth;
    flashOverlay.classList.add('danger');
    sfxCatchNegative();
    setExpression('sad');
    state.lastNegativeCatchAt = state.elapsed;
    state.caughtPositiveSinceNegative = false;
    if(it.id==='complaint'){
      state.stunnedUntil = Date.now() + 2000;
      sfxStun();
    }
  } else {
    var feverBonus = state.feverActive;
    if(feverBonus) applied = it.score * 2;
    spawnScorePop('+'+applied+(feverBonus?'!':''), 'pos', popX, popY);
    sfxCatchPositive();
    setExpression('happy');
    state.caughtPositiveSinceNegative = true;
  }
  state.score += applied;
  hudScore.textContent = state.score+'점';
}

/* ========================================================
   END GAME / RESULT (no login required - no shared storage)
======================================================== */
var sessionBestScore = 0;

function scoreTierMessage(score){
  if(score >= 1500) return '🏆 압도적인 실적! 오늘의 계약왕입니다';
  if(score >= 800) return '🥈 훌륭해요! 시상 유력 점수입니다';
  if(score >= 300) return '📄 안정적인 실적이에요';
  return '💪 다음 판엔 더 높은 점수에 도전해보세요';
}

function endGame(){
  state.running = false;
  state.paused = false;
  stopBgm();
  pauseLayer.classList.add('hidden');
  document.querySelectorAll('.falling-item, .falling-wrap').forEach(function(el){ el.remove(); });
  showScreen('result');

  var isNewBest = state.score > sessionBestScore;
  if(isNewBest) sessionBestScore = state.score;

  $('result-score').textContent = state.score+'점';
  $('result-tier').textContent = scoreTierMessage(state.score);
  $('result-rank').textContent = isNewBest
    ? '이번 접속 중 자기 최고 기록! 🎉'
    : '이번 접속 중 최고 기록: '+sessionBestScore+'점';

  var c = CHARACTERS.filter(function(x){return x.id===state.character;})[0];
  $('result-char').innerHTML = '<div class="mini-badge">'+charSVG(c.id)+'</div><div>'+c.name+' · '+escapeHtml(state.name)+'</div>';

  submitScoreOnline();
}

function escapeHtml(s){
  return String(s).replace(/[&<>"']/g, function(c){
    return ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'})[c];
  });
}

var GAME_URL = 'https://ewq9713-blip.github.io/';

function buildShareText(){
  var c = CHARACTERS.filter(function(x){return x.id===state.character;})[0];
  return '🏢 DB손해보험 전략사업부문 광화문사업단\n' +
    '📄 FC 계약 받아 소득 올리기\n' +
    '━━━━━━━━━━━━━\n' +
    '🙋 ' + (state.name || '플레이어') + ' (' + (c?c.name:'') + ')\n' +
    '🏆 최종 점수 : ' + state.score + '점 🏆\n' +
    '━━━━━━━━━━━━━\n\n' +
    '나도 도전하기 👉 이 링크를 눌러보세요!\n' +
    GAME_URL;
}

async function shareResult(){
  var text = buildShareText();
  if(navigator.share){
    try{
      await navigator.share({ title:'위너스지점 청약서 받기 결과', text:text });
      return;
    }catch(e){ /* user cancelled or share failed - fall through to clipboard */ }
  }
  try{
    await navigator.clipboard.writeText(text);
    var btn = $('btn-share');
    var original = btn.textContent;
    btn.textContent = '✅ 복사 완료! 카톡방에 붙여넣어 주세요';
    setTimeout(function(){ btn.textContent = original; }, 2200);
  }catch(e){
    alert(text);
  }
}


/* ========================================================
   RESULT SCREEN BUTTONS
======================================================== */
$('btn-share').addEventListener('click', function(){
  sfxClick();
  shareResult();
});
$('btn-retry').addEventListener('click', function(){
  sfxClick();
  showScreen('start');
});

})();
</script>
